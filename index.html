<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Распродажа личных вещей</title>
  <meta name="description" content="Личные вещи на продажу: цена ниже новой, отличное состояние." />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏷️</text></svg>" />
</head>
<body>
  <header class="hero">
    <div class="wrap">
      <h1 id="hTitle">Распродажа личных вещей</h1>
      <p class="sub" id="hSub">Проверенные вещи в отличном состоянии.</p>
      <div class="stats">
        <div class="stat"><b id="stTotal">0</b><span>всего вещей</span></div>
        <div class="stat"><b id="stAvail">0</b><span>доступно сейчас</span></div>
        <div class="stat"><b id="stCity">—</b><span>город</span></div>
      </div>
    </div>
  </header>

  <div class="controls">
    <div class="wrap">
      <div class="chips" id="catChips"></div>
      <div class="spacer"></div>
      <select class="sort" id="sortSel">
        <option value="default">По умолчанию</option>
        <option value="price-asc">Цена: дешевле</option>
        <option value="price-desc">Цена: дороже</option>
        <option value="discount">Скидка: больше</option>
      </select>
    </div>
  </div>

  <main class="wrap">
    <div class="grid" id="grid"></div>
    <div class="empty" id="empty" style="display:none">Ничего не найдено в этом фильтре.</div>
  </main>

  <footer>
    <div class="wrap">
      <span id="fContacts"></span> ·
      <a class="admin-link" href="admin.html">админка</a>
    </div>
  </footer>

  <div class="modal-backdrop" id="modal">
    <div class="modal" id="modalCard"></div>
  </div>

  <script src="data/config.js"></script>
  <script src="data/items.js"></script>
  <script src="js/status-store.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
